<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Industrial Lab - Parte B</title>

  <script>
    const startTime = performance.now();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>

  <style>
    .rs-base {
      transform: scale(0.60);
      transform-origin: top left;
    }
  </style>

  <script>
    window.addEventListener('load', () => {
      const loadTime = performance.now() - startTime;
      const label = document.getElementById('latencyLabel');
      if (label) {
        label.setAttribute('value', 'Carga inicial: ' + loadTime.toFixed(2) + ' ms');
      }
    });
  </script>
</head>
<body>
  <a-scene stats>
    <a-box
      position="0 1 -3"
      rotation="0 45 0"
      color="#4CC3D9">
    </a-box>

    <a-sphere
      position="2 1 -4"
      radius="1"
      color="#EF2D5E">
    </a-sphere>

    <a-cylinder
      position="-2 1 -4"
      radius="0.5"
      height="1.5"
      color="#FFC65D">
    </a-cylinder>

    <a-plane
      rotation="-90 0 0"
      width="10"
      height="10"
      color="#7BC8A4">
    </a-plane>

    <a-sky color="#ECECEC"></a-sky>

    <a-text
      id="latencyLabel"
      value="Cargando..."
      position="-1 2.7 -3"
      color="black"
      width="4">
    </a-text>
  </a-scene>
</body>
</html>
